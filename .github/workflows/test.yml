name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  catalog-integrity:
    name: marketplace and skill integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: pip install --quiet pytest

      - name: Verify lock file
        run: python scripts/build_skill_lock.py --check

      - name: Test lock builder
        working-directory: scripts
        run: pytest test_build_skill_lock.py -q

  point-in-time-research:
    name: point-in-time-research harness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/point-in-time-research/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pandas numpy pytest

      - name: Smoke — the bundled harness runs and emits no warnings
        run: |
          python -W error::RuntimeWarning information_set_compare.py --demo > /dev/null

      - name: Regression tests
        run: pytest test_information_set_compare.py -q

  compliance-audit-trail:
    name: compliance-audit-trail harness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/compliance-audit-trail/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: pip install --quiet pytest

      - name: Smoke — the bundled harness runs and emits no warnings
        run: |
          python -W error::RuntimeWarning governance_manifest_gate.py --demo > /dev/null

      - name: Regression tests
        run: pytest test_governance_manifest_gate.py -q

  multiple-testing-correction:
    name: multiple-testing-correction harness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/multiple-testing-correction/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet numpy scipy pytest

      - name: Smoke — the bundled harness runs and emits no warnings
        run: |
          python -W error::RuntimeWarning multiplicity_gate.py --demo > /dev/null

      - name: Regression tests
        run: pytest test_multiplicity_gate.py -q

  equity-research-report:
    name: equity research report gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/equity-research-report/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: pip install --quiet pytest

      - name: Regression tests
        run: pytest test_validate_equity_report.py -q

      - name: Invalid manifest fails closed
        run: |
          if python validate_equity_report.py /dev/null; then
            echo "validator unexpectedly accepted an empty manifest"
            exit 1
          fi

  ui-design-system:
    name: ui-design-system harness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/ui-design-system/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: pip install --quiet pytest

      - name: Smoke — both harnesses run their self-contained demo
        run: |
          python design_tokens.py --demo > /dev/null
          python design_lint.py --demo > /dev/null

      - name: Regression tests
        run: pytest -q
